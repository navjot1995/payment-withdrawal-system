<!doctype html>
<html>
  <head>
    <title>Withdrawal Demo</title>
    <style>
      body {
        font-family: Arial;
        padding: 40px;
        background: #f5f5f5;
      }

      .card {
        background: white;
        padding: 25px;
        max-width: 600px;
        margin: auto;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      input {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
      }

      button {
        padding: 10px;
        width: 100%;
        background: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 5px;
      }

      .status {
        margin-top: 20px;
        font-weight: bold;
      }

      .pending {
        color: orange;
      }
      .processing {
        color: blue;
      }
      .success {
        color: green;
      }
      .failed {
        color: red;
      }

      /* Rotating spinner */
      .spinner {
        margin-top: 10px;
        width: 25px;
        height: 25px;
        border: 4px solid #ccc;
        border-top: 4px solid blue;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: none;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Withdraw Funds</h2>

      <input type="text" id="userId" placeholder="User ID" />
      <input type="number" id="amount" placeholder="Amount" />
      <input type="text" id="destination" placeholder="Destination" />

      <button onclick="createWithdrawal()">Withdraw</button>

      <div class="status" id="statusText"></div>
      <div class="spinner" id="spinner"></div>
    </div>

    <script>
      let withdrawalId = null;
      let pollingInterval = null;

      async function createWithdrawal() {
        const userId = document.getElementById("userId").value;
        const amount = document.getElementById("amount").value;
        const destination = document.getElementById("destination").value;

        const res = await fetch("http://localhost:3000/api/withdrawals", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Idempotency-Key": crypto.randomUUID(),
          },
          body: JSON.stringify({ userId, amount, destination }),
        });

        const data = await res.json();
        withdrawalId = data._id;

        updateStatus(data.status);
        startPolling();
      }

      function startPolling() {
        pollingInterval = setInterval(checkStatus, 2000);
      }

      async function checkStatus() {
        if (!withdrawalId) return;

        const res = await fetch(
          `http://localhost:3000/api/withdrawals/${withdrawalId}`,
        );

        const data = await res.json();
        updateStatus(data.status);

        if (data.status === "success" || data.status === "failed") {
          clearInterval(pollingInterval);
          document.getElementById("spinner").style.display = "none";
        }
      }

      function updateStatus(status) {
        const statusText = document.getElementById("statusText");
        const spinner = document.getElementById("spinner");

        statusText.className = "status " + status;
        statusText.innerText = "Status: " + status.toUpperCase();

        if (status === "processing") {
          spinner.style.display = "block";
        } else {
          spinner.style.display = "none";
        }
      }
    </script>
  </body>
</html>
