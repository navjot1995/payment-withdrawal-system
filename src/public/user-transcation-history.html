<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Transaction Listing</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
        padding: 40px;
      }

      .container {
        max-width: 1000px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
      }

      input,
      button {
        padding: 8px;
        margin: 5px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
      }

      th {
        background: #007bff;
        color: white;
      }

      .pagination {
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Transaction Logs</h2>

      <label>User ID</label>
      <input type="text" id="userId" placeholder="Enter userId" />

      <button onclick="loadTransactions()">Load Transactions</button>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Balance Before</th>
            <th>Balance After</th>
            <th>Reference</th>
          </tr>
        </thead>

        <tbody id="transactionTable"></tbody>
      </table>

      <div class="pagination">
        <button onclick="prevPage()">Previous</button>
        <span id="pageNumber">1</span>
        <button onclick="nextPage()">Next</button>
      </div>
    </div>

    <script>
      const baseUrl = "http://localhost:3000/api";
      let currentPage = 1;
      const limit = 20;

      async function loadTransactions() {
        const userId = document.getElementById("userId").value;

        if (!userId) {
          alert("Enter userId");
          return;
        }

        const res = await fetch(
          `${baseUrl}/transactions?userId=${userId}&page=${currentPage}&limit=${limit}`,
          {
            credentials: "include",
          },
        );

        const { data } = await res.json();

        const table = document.getElementById("transactionTable");
        table.innerHTML = "";

        console.log(data);

        data.forEach((tx) => {
          const row = `
        <tr>
            <td>${new Date(tx.createdAt).toLocaleString()}</td>
            <td>${tx.type}</td>
            <td>${tx.amount}</td>
            <td>${tx.status}</td>
            <td>${tx.balanceBefore}</td>
            <td>${tx.balanceAfter}</td>
            <td>${tx.referenceId}</td>
        </tr>
        `;

          table.innerHTML += row;
        });

        document.getElementById("pageNumber").innerText = currentPage;
      }

      function nextPage() {
        currentPage++;
        loadTransactions();
      }

      function prevPage() {
        if (currentPage > 1) {
          currentPage--;
          loadTransactions();
        }
      }
    </script>
  </body>
</html>
